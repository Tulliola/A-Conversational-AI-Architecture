apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-deployment
  labels:
    app: llm
spec:
  selector:
    matchLabels:
      app: llm
  template:
    metadata:
      labels:
        app: llm
    spec:
      volumes:
      - name: llm-model-storage
        persistentVolumeClaim:
          claimName: hdd-pvc
      - name: dshm
        emptyDir:
          medium: Memory
          sizeLimit: "4Gi"
      containers:
      - name: llm
        image: vllm/vllm-openai:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
        env:
        - name: MODEL_NAME
          valueFrom:
            configMapKeyRef:
              name: llm-configmap
              key: MODEL_NAME
        - name: MODEL_PATH
          valueFrom:
            configMapKeyRef:
              name: llm-configmap
              key: MODEL_PATH
        command: ["/bin/sh", "-c"]
        args: 
        - | 
          vllm serve \
          --model $(MODEL_PATH) \
          --served-model-name $(MODEL_NAME) \
          --gpu-memory-utilization 0.8 \
          --dtype float16 \
          --max-model-len 2048 \
          --enforce-eager \
          --enable-prefix-caching \
          --enable-auto-tool-choice \
          --tool-call-parser hermes
        resources:
          limits:
            nvidia.com/gpu: 1
        volumeMounts:
        - name: llm-model-storage
          mountPath: /root/.cache/huggingface
        - name: dshm
          mountPath: /dev/shm
---
apiVersion: v1
kind: Service
metadata:
  name: llm-service
spec:
  type: NodePort
  selector:
    app: llm
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8000
    nodePort: 30001