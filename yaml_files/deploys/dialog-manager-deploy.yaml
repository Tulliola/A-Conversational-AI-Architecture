apiVersion: apps/v1
kind: Deployment
metadata:
  name: dialog-manager-deployment
  labels:
    app: dialog-manager
spec:
  selector:
    matchLabels:
      app: dialog-manager
  template:
    metadata:
      labels:
        app: dialog-manager
    spec:
      containers:
      - name: dialog-manager
        image: dialog-manager:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8001
        env:
        - name: KAFKA_URL
          valueFrom:
            configMapKeyRef:
              name: endpoints-configmap
              key: KAFKA_URL
        - name: LLM_URL
          valueFrom:
            configMapKeyRef:
              name: endpoints-configmap
              key: LLM_URL
        - name: EMBEDDING_URL
          valueFrom:
            configMapKeyRef:
              name: endpoints-configmap
              key: EMBEDDING_URL
        - name: EMBEDDING_MODEL_NAME
          valueFrom:
            configMapKeyRef:
              name: embedding-configmap
              key: EMBEDDING_MODEL_NAME
        - name: DB_URL
          valueFrom:
            configMapKeyRef:
              name: endpoints-configmap
              key: DB_URL
        - name: TOPIC_TO_CONSUME
          valueFrom:
            configMapKeyRef:
              name: kafka-topics-configmap
              key: CONVERSATION_HISTORY
        - name: TOPIC_TO_PRODUCE
          valueFrom:
            configMapKeyRef:
              name: kafka-topics-configmap
              key: LLM_RESPONSE
        - name: MODEL_NAME
          valueFrom:
            configMapKeyRef:
              name: llm-configmap
              key: MODEL_NAME
        - name: DB_AUTH_USER
          valueFrom:
            secretKeyRef:
              name: db-secret
              key: AUTH_USER
        - name: DB_AUTH_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-secret
              key: AUTH_PASSWORD
        command: ["python", "-u", "dialog-manager.py"]
