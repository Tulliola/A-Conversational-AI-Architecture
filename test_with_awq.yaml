apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-deployment
  labels:
    app: llm
spec:
  selector:
    matchLabels:
      app: llm
  template:
    metadata:
      labels:
        app: llm
    spec:
      volumes:
      - name: llm-model-storage
        persistentVolumeClaim:
          claimName: hdd-pvc
      - name: dshm
        emptyDir:
          medium: Memory
          sizeLimit: "4Gi"
      containers:
      - name: llm
        image: vllm/vllm-openai:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
        env:
        - name: HF_HOME
          value: "/root/.cache/huggingface"
        command: ["/bin/sh", "-c"]
        args: 
        - | 
          vllm serve \
          --model Qwen/Qwen2.5-3B-Instruct-AWQ \
          --gpu-memory-utilization 0.8 
        resources:
          limits:
            nvidia.com/gpu: 1
        volumeMounts:
        - name: llm-model-storage
          mountPath: /root/.cache/huggingface
        - name: dshm
          mountPath: /dev/shm
---
apiVersion: v1
kind: Service
metadata:
  name: llm-service
spec:
  type: NodePort
  selector:
    app: llm
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8000
    nodePort: 30001